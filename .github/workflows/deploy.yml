name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Trigger this action when you push to the main branch.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v2

      - name: Set up Node.js (optional if you're using a build tool like Gulp or Webpack)
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Build your static files (if necessary, for example with a build tool)
        run: npm run build  # Adjust this if you're using a build tool.

      - name: Push to public repository
        run: |
          git config --global user.name "Your GitHub Username"
          git config --global user.email "your-email@example.com"
          git remote add public https://github.com/your-username/public-repo.git
          git checkout --orphan gh-pages  # Creates a new branch for GitHub Pages.
          git rm -rf .
          cp -r * /
          git add .
          git commit -m "Deploy to GitHub Pages"
          git push public gh-pages --force
